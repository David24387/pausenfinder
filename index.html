<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pausenfinder</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .hero {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .badge {
      display: inline-block;
      background: #e0f2fe;
      color: #0369a1;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }

    p {
      line-height: 1.6;
    }

    .subtitle {
      color: #64748b;
      font-size: 18px;
      margin-bottom: 0;
    }

    .search-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 14px;
      align-items: end;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }
</html>
